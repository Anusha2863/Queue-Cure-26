<!DOCTYPE html>
<html>
<head>
<title>Queue Cure</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="card">

<h1>🏥 Queue Cure</h1>
<h2>Receptionist Dashboard</h2>

<input type="text" id="patientName" placeholder="Enter Patient Name">
<button onclick="addPatient()">Add Patient</button>

<br><br>

<label>Average Consultation Time:</label>
<input type="number" id="avgTime" value="10">

<h3>Current Token: <span id="currentToken">0</span></h3>

<button onclick="callNext()">Call Next</button>

<h3>Patients Waiting: <span id="waitingCount">0</span></h3>

</div>

<div class="card">

<h3>📊 Queue Analytics</h3>

<p>Total Patients: <span id="totalPatients">0</span></p>

<p>Patients Served: <span id="servedPatients">0</span></p>

<p>Current Queue Length: <span id="queueLength">0</span></p>

</div>

<h3>Patient Queue</h3>

<ul id="patientList"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
